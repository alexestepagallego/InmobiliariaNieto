document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"es\"><head>\n\n\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>García Nieto Inmobiliaria · Inmuebles en Córdoba<\u002Ftitle>\n<meta name=\"description\" content=\"Cartera cuidada de viviendas en venta y alquiler en Córdoba, del casco histórico a El Brillante.\">\n<script src=\"fd389946-948d-46fd-af15-f5844548cca1\"><\u002Fscript>\n<style>\n  :root{\n    --paper:#FBF9F4; --paper-2:#F3EEE4; --surface:#FFFFFF;\n    --ink:#1C2620; --muted:#6E7B72; --line:#E7E1D6; --line-2:#D8D0C1;\n    --pine:#C25C86; --pine-d:#9E4569; --pine-soft:#FBEBF2;\n    --clay:#D6A233; --clay-d:#B0821E;\n    --shadow:0 1px 2px rgba(28,38,32,.04), 0 18px 40px -26px rgba(28,38,32,.35);\n    --shadow-lg:0 30px 70px -30px rgba(28,38,32,.45);\n    --r:14px;\n    --serif:ui-serif,\"Iowan Old Style\",\"Palatino Linotype\",Palatino,\"Book Antiqua\",Georgia,serif;\n    --sans:ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif;\n    --mono:ui-monospace,\"SF Mono\",Menlo,Consolas,monospace;\n  }\n  @media (prefers-color-scheme:dark){\n    :root{\n      --paper:#11150F; --paper-2:#171D15; --surface:#191F17;\n      --ink:#ECEAE0; --muted:#9AA79C; --line:#2A3227; --line-2:#39422F;\n      --pine:#E48CAE; --pine-d:#EDA6C1; --pine-soft:#241A20;\n      --clay:#E8C46B; --clay-d:#EFD489;\n      --shadow:0 1px 2px rgba(0,0,0,.4), 0 18px 40px -26px rgba(0,0,0,.7);\n      --shadow-lg:0 30px 70px -30px rgba(0,0,0,.8);\n    }\n  }\n  :root[data-theme=\"light\"]{\n    --paper:#FBF9F4; --paper-2:#F3EEE4; --surface:#FFFFFF;\n    --ink:#1C2620; --muted:#6E7B72; --line:#E7E1D6; --line-2:#D8D0C1;\n    --pine:#C25C86; --pine-d:#9E4569; --pine-soft:#FBEBF2;\n    --clay:#D6A233; --clay-d:#B0821E;\n    --shadow:0 1px 2px rgba(28,38,32,.04), 0 18px 40px -26px rgba(28,38,32,.35);\n    --shadow-lg:0 30px 70px -30px rgba(28,38,32,.45);\n  }\n  :root[data-theme=\"dark\"]{\n    --paper:#11150F; --paper-2:#171D15; --surface:#191F17;\n    --ink:#ECEAE0; --muted:#9AA79C; --line:#2A3227; --line-2:#39422F;\n    --pine:#E48CAE; --pine-d:#EDA6C1; --pine-soft:#241A20;\n    --clay:#E8C46B; --clay-d:#EFD489;\n    --shadow:0 1px 2px rgba(0,0,0,.4), 0 18px 40px -26px rgba(0,0,0,.7);\n    --shadow-lg:0 30px 70px -30px rgba(0,0,0,.8);\n  }\n\n  *{box-sizing:border-box}\n  body{margin:0; background:var(--paper); color:var(--ink);\n    font-family:var(--sans); font-size:16px; line-height:1.55;\n    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}\n  a{color:inherit}\n  img{max-width:100%}\n\n  .wrap{max-width:1160px; margin:0 auto; padding:0 24px}\n\n  /* Header */\n  header{position:sticky; top:0; z-index:20; backdrop-filter:saturate(1.2) blur(10px);\n    background:color-mix(in srgb, var(--paper) 86%, transparent);\n    border-bottom:1px solid var(--line);}\n  .hrow{display:flex; align-items:center; gap:18px; height:78px}\n  .logo{display:flex; align-items:center; gap:11px; font-family:var(--serif); font-size:19px; letter-spacing:.2px}\n  .logo img{height:67px; width:123px; display:block}\n  @media (prefers-color-scheme:dark){ .logo img{filter:invert(1) brightness(1.1)} }\n  :root[data-theme=\"dark\"] .logo img{filter:invert(1) brightness(1.1)}\n  :root[data-theme=\"light\"] .logo img{filter:none}\n  .logo b{font-weight:600}\n  .logo .est{font-size:11px; font-family:var(--sans); letter-spacing:.22em; text-transform:uppercase; color:var(--muted)}\n  .hspace{flex:1}\n  .hnav{display:flex; gap:26px; font-size:14.5px; color:var(--muted)}\n  .hnav a{text-decoration:none; transition:color .15s}\n  .hnav a:hover{color:var(--ink)}\n  .tbtn{width:38px; height:38px; border-radius:10px; border:1px solid var(--line-2); background:transparent;\n    color:var(--ink); cursor:pointer; display:grid; place-items:center; font-size:16px}\n  .tbtn:hover{background:var(--paper-2)}\n\n  /* Hero */\n  .hero{padding:64px 0 30px; position:relative; overflow:hidden;\n    background:linear-gradient(135deg, color-mix(in srgb, var(--clay) 10%, transparent), color-mix(in srgb, var(--pine) 10%, transparent));\n    border-radius:0 0 32px 32px}\n  .hero-carousel{position:absolute; inset:0; z-index:0}\n  .hero-carousel .slide{position:absolute; inset:0; opacity:0; transition:opacity 2.2s ease; background-size:cover; background-position:center; filter:saturate(1.1)}\n  .hero-carousel .slide.on{opacity:.3}\n  :root[data-theme=\"dark\"] .hero-carousel .slide.on{opacity:.4}\n  @media (prefers-color-scheme:dark){ .hero-carousel .slide.on{opacity:.4} }\n  :root[data-theme=\"dark\"] .hero-carousel .slide{filter:saturate(1.1) brightness(1.3)}\n  @media (prefers-color-scheme:dark){ .hero-carousel .slide{filter:saturate(1.1) brightness(1.3)} }\n  .hero > *:not(.hero-carousel){position:relative; z-index:1}\n  .hero .eyebrow{font-family:var(--mono); font-size:12.5px; letter-spacing:.16em; text-transform:uppercase;\n    color:var(--pine); display:flex; align-items:center; gap:10px; margin-bottom:20px}\n  .hero .eyebrow::before{content:\"\"; width:30px; height:1px; background:var(--pine)}\n  .hero h1{font-family:var(--serif); font-weight:600; font-size:clamp(38px,6vw,68px); line-height:1.02;\n    letter-spacing:-.5px; margin:0 0 20px; max-width:15ch; text-wrap:balance}\n  .hero h1 em{font-style:italic; color:var(--pine)}\n  .hero p{font-size:18px; color:var(--muted); max-width:52ch; margin:0 0 30px}\n  .archline{position:absolute; right:-40px; top:20px; width:min(46%,520px); opacity:.5; pointer-events:none; color:var(--clay)}\n  @media (prefers-color-scheme:dark){ .archline{opacity:.28} }\n  :root[data-theme=\"dark\"] .archline{opacity:.28}\n  :root[data-theme=\"light\"] .archline{opacity:.5}\n\n  /* Controles / filtros */\n  .controls{display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:8px 0 30px}\n  .chips{display:flex; gap:8px; background:var(--paper-2); padding:5px; border-radius:999px; border:1px solid var(--line)}\n  .chip{border:none; background:transparent; font-family:var(--sans); font-size:14px; font-weight:500;\n    color:var(--muted); padding:8px 16px; border-radius:999px; cursor:pointer; transition:.15s}\n  .chip[aria-pressed=\"true\"]{background:var(--surface); color:var(--ink); box-shadow:var(--shadow)}\n  .search{flex:1; min-width:200px; display:flex; align-items:center; gap:9px; background:var(--surface);\n    border:1px solid var(--line-2); border-radius:12px; padding:0 14px; height:46px}\n  .search input{flex:1; border:none; background:transparent; font-family:var(--sans); font-size:15px; color:var(--ink); outline:none}\n  .search svg{color:var(--muted); flex-shrink:0}\n  .count{font-family:var(--mono); font-size:13px; color:var(--muted); white-space:nowrap}\n\n  /* Rejilla */\n  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:30px 26px; padding-bottom:70px}\n  .prop{border:none; background:transparent; text-align:left; padding:0; cursor:pointer; font-family:inherit;\n    display:flex; flex-direction:column; color:inherit}\n  .photo{position:relative; aspect-ratio:5/4; border-radius:130px 130px var(--r) var(--r); overflow:hidden;\n    border:1px solid var(--line); box-shadow:var(--shadow); transition:transform .35s cubic-bezier(.2,.7,.3,1), box-shadow .35s}\n  .prop:hover .photo{transform:translateY(-6px); box-shadow:var(--shadow-lg)}\n  .prop:focus-visible .photo{outline:2px solid var(--pine); outline-offset:3px}\n  .photo .art{position:absolute; inset:0}\n  .photo img, .shot img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block}\n  .badge{position:absolute; bottom:16px; left:16px; z-index:2; font-family:var(--sans); font-size:11.5px; font-weight:600;\n    letter-spacing:.03em; padding:5px 11px; border-radius:999px; backdrop-filter:blur(4px);\n    background:color-mix(in srgb, var(--surface) 82%, transparent); border:1px solid var(--line)}\n  .badge.venta{color:var(--pine-d)} .badge.alquiler{color:var(--clay-d)}\n  :root[data-theme=\"dark\"] .badge.venta{color:var(--pine)}\n  @media (prefers-color-scheme:dark){ .badge.venta{color:var(--pine)} }\n\n  .pbody{padding:16px 4px 0; display:flex; flex-direction:column; gap:8px}\n  .ptop{display:flex; justify-content:space-between; align-items:baseline; gap:12px}\n  .ptitle{font-family:var(--serif); font-size:20px; font-weight:600; line-height:1.2; letter-spacing:-.2px}\n  .pzone{font-size:13.5px; color:var(--muted); margin-top:2px}\n  .pprice{font-family:var(--serif); font-size:20px; font-weight:600; color:var(--clay); white-space:nowrap;\n    font-variant-numeric:tabular-nums}\n  .pprice small{font-family:var(--sans); font-size:12px; color:var(--muted); font-weight:400}\n  .facts{display:flex; gap:16px; font-family:var(--mono); font-size:12.5px; color:var(--muted); margin-top:2px}\n  .facts span{display:flex; align-items:center; gap:5px}\n\n  .empty{grid-column:1/-1; text-align:center; color:var(--muted); padding:60px 0; font-size:15px}\n\n  /* Ficha modal */\n  .ov{position:fixed; inset:0; z-index:60; background:rgba(17,21,15,.55); backdrop-filter:blur(3px);\n    display:none; align-items:flex-start; justify-content:center; padding:5vh 18px; overflow-y:auto}\n  .ov.show{display:flex}\n  .sheet{background:var(--surface); border:1px solid var(--line); border-radius:20px; max-width:760px; width:100%;\n    box-shadow:var(--shadow-lg); overflow:hidden; animation:rise .3s ease both}\n  @keyframes rise{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}\n  .sheet .shot{position:relative; aspect-ratio:16/9}\n  .sheet .close{position:absolute; top:16px; right:16px; z-index:3; width:40px; height:40px; border-radius:50%;\n    border:1px solid var(--line); background:color-mix(in srgb,var(--surface) 85%,transparent); backdrop-filter:blur(6px);\n    cursor:pointer; font-size:18px; color:var(--ink); display:grid; place-items:center}\n  .sheet-b{padding:26px 30px 30px}\n  .sheet-b .sbadge{font-family:var(--mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--pine)}\n  .sheet-b h2{font-family:var(--serif); font-weight:600; font-size:30px; line-height:1.1; margin:8px 0 4px; letter-spacing:-.4px}\n  .sheet-b .zone{color:var(--muted); margin-bottom:18px}\n  .sgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:20px 0}\n  .stat{background:var(--paper-2); border:1px solid var(--line); border-radius:12px; padding:13px 14px}\n  .stat .k{font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted)}\n  .stat .v{font-family:var(--serif); font-size:22px; font-weight:600; margin-top:3px; font-variant-numeric:tabular-nums}\n  .sdesc{color:var(--ink); opacity:.9; margin:6px 0 22px; max-width:60ch}\n  .sprice{font-family:var(--serif); font-size:30px; font-weight:600; color:var(--clay); font-variant-numeric:tabular-nums}\n  .sprice small{font-family:var(--sans); font-size:14px; color:var(--muted); font-weight:400}\n  .cta{display:flex; gap:12px; flex-wrap:wrap; margin-top:22px}\n  .btn{border:none; border-radius:12px; padding:14px 22px; font-family:var(--sans); font-size:15px; font-weight:600;\n    cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:9px; transition:.15s}\n  .btn.p{background:var(--pine); color:#fff} .btn.p:hover{background:var(--pine-d)}\n  :root[data-theme=\"dark\"] .btn.p{color:#0B1410}\n  @media (prefers-color-scheme:dark){ .btn.p{color:#0B1410} }\n  .btn.g{background:transparent; color:var(--ink); border:1px solid var(--line-2)} .btn.g:hover{background:var(--paper-2)}\n\n  /* Footer */\n  footer{border-top:1px solid var(--line); padding:44px 0; margin-top:20px; color:var(--muted); font-size:14px}\n  .frow{display:flex; justify-content:space-between; gap:24px; flex-wrap:wrap; align-items:center}\n  .frow .logo{color:var(--ink)}\n\n  @media (max-width:560px){\n    .hnav{display:none}\n    .sgrid{grid-template-columns:repeat(2,1fr)}\n    .sheet-b{padding:22px}\n    .hero{padding-top:44px}\n  }\n  @media (prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important} }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header>\n  <div class=\"wrap hrow\">\n    <div class=\"logo\"><img src=\"f1d8201b-7b1b-4ab9-86ae-810981675b52\" alt=\"García Nieto Inmobiliaria\"><\u002Fdiv>\n    <div class=\"hspace\"><\u002Fdiv>\n    <nav class=\"hnav\">\n      <a href=\"#cartera\">Cartera<\u002Fa>\n      <a href=\"#\" data-op=\"venta\">En venta<\u002Fa>\n      <a href=\"#\" data-op=\"alquiler\">Alquiler<\u002Fa>\n      <a href=\"#contacto\">Contacto<\u002Fa>\n    <\u002Fnav>\n    <button class=\"tbtn\" id=\"theme\" aria-label=\"Cambiar tema\">☾<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n  <section class=\"hero wrap\">\n    <div class=\"hero-carousel\" id=\"heroCarousel\" aria-hidden=\"true\">\n    <svg class=\"archline\" viewBox=\"0 0 520 300\" fill=\"none\" aria-hidden=\"true\">\n      <g stroke=\"currentColor\" stroke-width=\"2\">\n        <path d=\"M20 290V150c0-30 24-54 54-54s54 24 54 54v140\"><\u002Fpath>\n        <path d=\"M148 290V150c0-30 24-54 54-54s54 24 54 54v140\"><\u002Fpath>\n        <path d=\"M276 290V150c0-30 24-54 54-54s54 24 54 54v140\"><\u002Fpath>\n        <path d=\"M404 290V150c0-30 24-54 54-54s54 24 54 54v140\"><\u002Fpath>\n        <path d=\"M8 150h504\" opacity=\".5\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"eyebrow\">Inmuebles seleccionados<\u002Fdiv>\n    <h1 style=\"margin-left:14px\">Casas con <em>alma<\u002Fem> en el corazón de Córdoba.<\u002Fh1>\n    <div style=\"font-family:var(--serif); font-size:15px; letter-spacing:.05em; color:#fff; margin:-8px 0 18px 14px; text-shadow:0 1px 8px rgba(0,0,0,.35)\" data-comment-anchor=\"848b8a1360-div\">García Nieto Inmobiliaria<\u002Fdiv>\n    <p style=\"color:#fff; margin-left:14px; text-shadow:0 1px 8px rgba(0,0,0,.35)\" data-comment-anchor=\"1fb699a85f-p\"><br><\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"wrap\" id=\"cartera\">\n    <div class=\"controls\">\n      <div class=\"chips\" role=\"group\" aria-label=\"Filtrar por operación\">\n        <button class=\"chip\" data-f=\"todos\" aria-pressed=\"true\">Todos<\u002Fbutton>\n        <button class=\"chip\" data-f=\"venta\" aria-pressed=\"false\">En venta<\u002Fbutton>\n        <button class=\"chip\" data-f=\"alquiler\" aria-pressed=\"false\">Alquiler<\u002Fbutton>\n      <\u002Fdiv>\n      <label class=\"search\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n        <input id=\"q\" type=\"search\" placeholder=\"Buscar por zona, tipo…\" aria-label=\"Buscar inmuebles\">\n      <\u002Flabel>\n      <div class=\"count\" id=\"count\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grid\" id=\"grid\"><\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer id=\"contacto\">\n  <div class=\"wrap frow\">\n    <div class=\"logo\"><img src=\"f1d8201b-7b1b-4ab9-86ae-810981675b52\" alt=\"García Nieto Inmobiliaria\" style=\"height:64px\"><\u002Fdiv>\n    <div>Av. del Brillante 12, 14012 Córdoba · <a href=\"tel:+34957000000\" style=\"color:var(--pine);text-decoration:none\">957 00 00 00<\u002Fa> · <a href=\"mailto:hola@inmonieto.es\" style=\"color:var(--pine);text-decoration:none\">hola@inmonieto.es<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div class=\"ov\" id=\"ov\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Detalle del inmueble\">\n  <div class=\"sheet\" id=\"sheet\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  /* ════════════════════════════════════════════════════════════════════\n     CONFIGURACIÓN — pega aquí tus 2 valores de Supabase (los MISMOS del\n     panel). Mientras estén vacíos, la web muestra inmuebles de ejemplo.\n     ════════════════════════════════════════════════════════════════════ */\n  const SUPABASE_URL      = \"https://zooypbivscuyyhdukyjm.supabase.co\";   // URL base del proyecto (sin /rest/v1/)\n  const SUPABASE_ANON_KEY = \"sb_publishable_5FHR8R-8KN8HfDftIhCabg_MzIHEhKu\";   // la clave pública: \"sb_publishable_...\" o la antigua \"eyJ...\"\n\n  /* Datos y teléfono de contacto de la agencia (cámbialos por los reales) */\n  const TEL   = \"+34690608881\";\n  const EMAIL = \"hola@inmonieto.es\";\n\n  /* ── Inmuebles de ejemplo (se usan si no hay Supabase configurado) ── */\n  const DEMO = [\n    {id:1, titulo:\"Casa en El Brillante\", zona:\"El Brillante\", tipo:\"Casa\", op:\"venta\", precio:420000, m2:180, hab:4, ban:2, foto_url:null,\n      desc:\"Vivienda unifamiliar con jardín y garaje en una de las zonas más tranquilas de la ciudad. Amplios espacios, mucha luz natural y patio trasero orientado al sur.\"},\n    {id:2, titulo:\"Piso céntrico reformado\", zona:\"Centro\", tipo:\"Piso\", op:\"venta\", precio:185000, m2:90, hab:3, ban:2, foto_url:null,\n      desc:\"A estrenar tras una reforma integral. Cocina abierta, suelos de microcemento y balcón a calle peatonal, a un paso de todo.\"},\n    {id:3, titulo:\"Ático en Ciudad Jardín\", zona:\"Ciudad Jardín\", tipo:\"Ático\", op:\"alquiler\", precio:1200, m2:110, hab:3, ban:2, foto_url:null,\n      desc:\"Ático luminoso con terraza de 25 m² y vistas despejadas. Incluye plaza de garaje y trastero. Comunidad con piscina.\"},\n    {id:4, titulo:\"Casa-patio en la Judería\", zona:\"Judería\", tipo:\"Casa\", op:\"venta\", precio:560000, m2:220, hab:5, ban:3, foto_url:null,\n      desc:\"Auténtica casa cordobesa con patio central empedrado, arcos de medio punto y celosías. Historia y encanto en pleno casco histórico.\"},\n    {id:5, titulo:\"Dúplex a estrenar en Poniente\", zona:\"Poniente\", tipo:\"Dúplex\", op:\"venta\", precio:245000, m2:120, hab:3, ban:2, foto_url:null,\n      desc:\"Obra nueva de altas calidades, con aerotermia y domótica. Dos plantas, salón a doble altura y azotea comunitaria.\"},\n    {id:6, titulo:\"Estudio junto a la Ribera\", zona:\"Ribera\", tipo:\"Estudio\", op:\"alquiler\", precio:750, m2:45, hab:1, ban:1, foto_url:null,\n      desc:\"Acogedor estudio reformado con vistas al Guadalquivir. Ideal para una persona o pareja, amueblado y listo para entrar.\"},\n  ];\n\n  let DATA = DEMO;\n  let filtro = \"todos\", q = \"\";\n  const eur = n => (Number(n)||0).toLocaleString(\"es-ES\");\n  const esc = s => String(s??\"\").replace(/[&<>\"]/g, c => ({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\"}[c]));\n  const grid = document.getElementById(\"grid\");\n  const count = document.getElementById(\"count\");\n\n  /* ── Carrusel de fondo en el hero (placeholders de foto con desvanecido) ── */\n  (function heroCarousel(){\n    const host = document.getElementById(\"heroCarousel\");\n    const fotos = [\n      \"https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=1600&q=60&auto=format&fit=crop\", // fachada casa sencilla\n      \"https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=1600&q=60&auto=format&fit=crop\", // salón humilde\n      \"https://images.unsplash.com/photo-1560185127-6ed189bf02f4?w=1600&q=60&auto=format&fit=crop\", // cocina modesta\n      \"https://images.unsplash.com/photo-1523217582562-09d0def993a6?w=1600&q=60&auto=format&fit=crop\"  // fachada casa humilde\n    ];\n    const slides = fotos.map(src=>{\n      const div = document.createElement(\"div\");\n      div.className = \"slide\";\n      div.style.backgroundImage = `url(\"${src}\")`;\n      host.appendChild(div);\n      return div;\n    });\n    let i = 0;\n    slides[0].classList.add(\"on\");\n    setInterval(()=>{\n      slides[i].classList.remove(\"on\");\n      i = (i+1) % slides.length;\n      slides[i].classList.add(\"on\");\n    }, 4500);\n  })();\n\n  /* Tono estable por inmueble para el marco decorativo (cuando no hay foto) */\n  function hue(id){ let n=0; for(const c of String(id)) n=(n*31+c.charCodeAt(0))%360; return n; }\n\n  /* Convierte una fila de Supabase al modelo que usa la web */\n  function fromDB(r){\n    return { id:r.id, titulo:r.titulo||\"Inmueble\", zona:r.municipio||\"Córdoba\", tipo:r.tipo||\"Vivienda\",\n      op:r.operacion||\"venta\", precio:Number(r.precio)||0, m2:r.superficie_m2, hab:r.habitaciones,\n      ban:r.banos, desc:r.descripcion||\"\", foto_url:r.foto_url||null };\n  }\n\n  /* \"Foto\" en arco: lienzo cálido con arcada andaluza, tono por inmueble */\n  function art(id){ const h=hue(id);\n    return `<svg class=\"art\" viewBox=\"0 0 400 320\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n      <defs><linearGradient id=\"g${h}\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"hsl(${h},42%,86%)\"/><stop offset=\"1\" stop-color=\"hsl(${(h+22)%360},38%,72%)\"/>\n      <\u002FlinearGradient><\u002Fdefs>\n      <rect width=\"400\" height=\"320\" fill=\"url(#g${h})\"/>\n      <circle cx=\"312\" cy=\"86\" r=\"34\" fill=\"hsl(${h},60%,94%)\" opacity=\".8\"/>\n      <g fill=\"none\" stroke=\"hsl(${(h+20)%360},45%,40%)\" stroke-width=\"3\" opacity=\".55\">\n        <path d=\"M40 300V196c0-24 19-43 43-43s43 19 43 43v104\"/>\n        <path d=\"M150 300V196c0-24 19-43 43-43s43 19 43 43v104\"/>\n        <path d=\"M260 300V196c0-24 19-43 43-43s43 19 43 43v104\"/>\n        <path d=\"M20 196h360\"/><\u002Fg>\n      <g fill=\"hsl(${(h+120)%360},34%,34%)\" opacity=\".5\"><path d=\"M356 300c0-40 8-92 14-92s14 52 14 92z\"/><\u002Fg>\n    <\u002Fsvg>`;\n  }\n  function foto(p){ return p.foto_url\n    ? `<img src=\"${esc(p.foto_url)}\" alt=\"${esc(p.titulo)}\" loading=\"lazy\">` : art(p.id); }\n  function facts(p){ const f=[];\n    if(p.m2)  f.push(`<span>◱ ${esc(p.m2)} m²<\u002Fspan>`);\n    if(p.hab) f.push(`<span>◧ ${esc(p.hab)} hab<\u002Fspan>`);\n    if(p.ban) f.push(`<span>◇ ${esc(p.ban)} baños<\u002Fspan>`);\n    return f.join(\"\"); }\n  function precioHTML(p){ return p.op===\"alquiler\" ? `${eur(p.precio)} €<small>/mes<\u002Fsmall>` : `${eur(p.precio)} €`; }\n\n  function card(p){\n    return `<button class=\"prop\" data-id=\"${esc(p.id)}\">\n      <div class=\"photo\">\n        <span class=\"badge ${p.op===\"alquiler\"?\"alquiler\":\"venta\"}\">${p.op===\"alquiler\"?\"En alquiler\":\"En venta\"}<\u002Fspan>\n        ${foto(p)}\n      <\u002Fdiv>\n      <div class=\"pbody\">\n        <div class=\"ptop\">\n          <div><div class=\"ptitle\">${esc(p.titulo)}<\u002Fdiv><div class=\"pzone\">${esc(p.tipo)} · ${esc(p.zona)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"pprice\">${precioHTML(p)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"facts\">${facts(p)}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fbutton>`;\n  }\n\n  function render(){\n    const list = DATA.filter(p=>{\n      const okF = filtro===\"todos\" || p.op===filtro;\n      const okQ = !q || (p.titulo+\" \"+p.zona+\" \"+p.tipo).toLowerCase().includes(q);\n      return okF && okQ;\n    });\n    grid.innerHTML = list.length ? list.map(card).join(\"\")\n      : `<div class=\"empty\">No hay inmuebles que coincidan con tu búsqueda.<\u002Fdiv>`;\n    count.textContent = `${list.length} ${list.length===1?\"inmueble\":\"inmuebles\"}`;\n    grid.querySelectorAll(\".prop\").forEach(b=>b.addEventListener(\"click\",()=>detalle(b.dataset.id)));\n  }\n\n  function detalle(id){\n    const p = DATA.find(x=>String(x.id)===String(id)); if(!p) return;\n    const asunto = encodeURIComponent(`Interés en: ${p.titulo} (${p.zona})`);\n    document.getElementById(\"sheet\").innerHTML = `\n      <div class=\"shot\"><button class=\"close\" id=\"close\" aria-label=\"Cerrar\">✕<\u002Fbutton>${foto(p)}<\u002Fdiv>\n      <div class=\"sheet-b\">\n        <div class=\"sbadge\">${p.op===\"alquiler\"?\"En alquiler\":\"En venta\"} · ${esc(p.tipo)}<\u002Fdiv>\n        <h2>${esc(p.titulo)}<\u002Fh2>\n        <div class=\"zone\">${esc(p.zona)}, Córdoba<\u002Fdiv>\n        <div class=\"sprice\">${precioHTML(p).replace(\"<small>\",\"<small> \")}<\u002Fdiv>\n        <div class=\"sgrid\">\n          <div class=\"stat\"><div class=\"k\">Superficie<\u002Fdiv><div class=\"v\">${p.m2?esc(p.m2):\"—\"}<span style=\"font-size:13px\"> m²<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"k\">Habitac.<\u002Fdiv><div class=\"v\">${p.hab?esc(p.hab):\"—\"}<\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"k\">Baños<\u002Fdiv><div class=\"v\">${p.ban?esc(p.ban):\"—\"}<\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"k\">Tipo<\u002Fdiv><div class=\"v\" style=\"font-size:16px\">${esc(p.tipo)}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        ${p.desc?`<p class=\"sdesc\">${esc(p.desc)}<\u002Fp>`:\"\"}\n        <div class=\"cta\">\n          <a class=\"btn p\" href=\"https://wa.me/${TEL.replace(/[^0-9]/g,\"\")}?text=${asunto}\">Solicitar visita<\u002Fa>\n          <a class=\"btn g\" href=\"tel:${TEL}\">Llamar<\u002Fa>\n          <a class=\"btn g\" href=\"mailto:${EMAIL}?subject=${asunto}\">Escribir<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    const ov = document.getElementById(\"ov\");\n    ov.classList.add(\"show\"); document.body.style.overflow=\"hidden\";\n    document.getElementById(\"close\").addEventListener(\"click\", cerrar);\n  }\n  function cerrar(){ document.getElementById(\"ov\").classList.remove(\"show\"); document.body.style.overflow=\"\"; }\n  document.getElementById(\"ov\").addEventListener(\"click\", e=>{ if(e.target.id===\"ov\") cerrar(); });\n  document.addEventListener(\"keydown\", e=>{ if(e.key===\"Escape\") cerrar(); });\n\n  document.querySelectorAll(\".chip\").forEach(c=>c.addEventListener(\"click\", ()=>{\n    filtro = c.dataset.f;\n    document.querySelectorAll(\".chip\").forEach(x=>x.setAttribute(\"aria-pressed\", x===c));\n    render();\n  }));\n  document.querySelectorAll(\".hnav [data-op]\").forEach(a=>a.addEventListener(\"click\", e=>{\n    e.preventDefault(); const op=a.dataset.op;\n    filtro=op; document.querySelectorAll(\".chip\").forEach(x=>x.setAttribute(\"aria-pressed\", x.dataset.f===op));\n    render(); document.getElementById(\"cartera\").scrollIntoView({behavior:\"smooth\"});\n  }));\n  document.getElementById(\"q\").addEventListener(\"input\", e=>{ q=e.target.value.trim().toLowerCase(); render(); });\n\n  /* Tema: respeta el del sistema y permite alternar */\n  const tb = document.getElementById(\"theme\");\n  const mm = window.matchMedia ? window.matchMedia.bind(window) : () => ({ matches:false, addEventListener(){} });\n  const prefiereOscuro = () => mm(\"(prefers-color-scheme:dark)\").matches;\n  function setIcon(){ const dark = (document.documentElement.dataset.theme||\"\")===\"dark\"\n      || (!document.documentElement.dataset.theme && prefiereOscuro());\n    tb.textContent = dark ? \"☀\" : \"☾\"; }\n  tb.addEventListener(\"click\", ()=>{\n    const cur = document.documentElement.dataset.theme || (prefiereOscuro() ? \"dark\":\"light\");\n    document.documentElement.dataset.theme = cur===\"dark\" ? \"light\":\"dark\"; setIcon();\n  });\n  mm(\"(prefers-color-scheme:dark)\").addEventListener(\"change\", setIcon);\n  setIcon();\n\n  /* ── Carga de datos: Supabase si está configurado; si no, ejemplos ── */\n  async function cargar(){\n    if(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase){\n      try{\n        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);\n        const { data, error } = await sb\n          .from(\"inmuebles\").select(\"*\")\n          .eq(\"publicado_web\", true)\n          .order(\"publicado_en\", { ascending:false, nullsFirst:false });\n        if(error) throw error;\n        DATA = (data||[]).map(fromDB);\n      }catch(e){\n        console.warn(\"No se pudo cargar de Supabase, se muestran ejemplos:\", e.message);\n        DATA = DEMO;\n      }\n    }\n    render();\n  }\n  cargar();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
